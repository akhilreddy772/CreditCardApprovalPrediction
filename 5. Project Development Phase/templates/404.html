<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .error-container {
            max-width: 600px;
            margin: 5rem auto;
            text-align: center;
            background: #fff;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--color-border);
        }

        .error-container h1 {
            font-size: 5rem;
            color: var(--color-rose);
            margin-bottom: 1rem;
        }

        .error-container p {
            color: var(--color-text-muted);
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }
    </style>
</head>

<body>
    <div class="container fade-in-up">
        <nav class="navbar">
            <div class="nav-container">
                <a href="{{ url_for('welcome') }}" class="nav-brand">💳 CreditPredict</a>
            </div>
        </nav>

        <div class="error-container fade-in-up delay-1">
            <h1>404</h1>
            <h2>{{ error | default('Page Not Found') }}</h2>
            <p>The endpoint or page you requested cannot be located securely.</p>
            <a href="{{ url_for('home') }}" class="btn-primary">Return to Dashboard</a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
