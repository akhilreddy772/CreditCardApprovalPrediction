<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - CreditPredict</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .auth-form-container {
            max-width: 500px;
            margin: 4rem auto;
            background: #fff;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--color-border);
        }

        .auth-form-container h2 {
            text-align: center;
            margin-bottom: 2rem;
            color: var(--color-slate-900);
        }

        .alert {
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
        }

        .alert-error {
            background-color: #fee2e2;
            color: #991b1b;
            border: 1px solid #f87171;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 40px;
            cursor: pointer;
            color: var(--color-text-muted);
            font-size: 0.9rem;
            user-select: none;
        }

        .password-wrapper {
            position: relative;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--color-border);
            border-radius: 8px;
            font-family: inherit;
            margin-top: 0.25rem;
        }
    </style>
</head>

<body>
    <div class="container fade-in-up">
        <nav class="navbar">
            <div class="nav-container">
                <a href="{{ url_for('welcome') }}" class="nav-brand">💳 CreditPredict</a>
            </div>
        </nav>

        <div class="auth-form-container fade-in-up delay-1">
            <h2>Create an Account</h2>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form action="{{ url_for('auth.signup') }}" method="POST">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="fullname" required placeholder="John Doe" class="form-control">
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" required placeholder="john@example.com" class="form-control">
                </div>

                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" required placeholder="johndoe123" class="form-control">
                </div>

                <div class="form-group password-wrapper">
                    <label>Password</label>
                    <input type="password" name="password" id="password" required minlength="6"
                        placeholder="Create a strong password" class="form-control">
                    <span class="toggle-password" onclick="togglePassword('password')">Show</span>
                </div>

                <div class="form-group password-wrapper">
                    <label>Confirm Password</label>
                    <input type="password" name="confirm_password" id="confirm_password" required minlength="6"
                        placeholder="Re-enter your password" class="form-control">
                    <span class="toggle-password" onclick="togglePassword('confirm_password')">Show</span>
                </div>

                <div class="form-group" style="display: flex; align-items: center; gap: 8px; margin-top: 1rem;">
                    <input type="checkbox" required name="terms" style="width: auto; margin:0;" id="terms">
                    <label for="terms" style="margin-bottom: 0; font-weight: normal; font-size: 0.9rem;">I accept the
                        Terms and Conditions</label>
                </div>

                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1.5rem;">Create
                    Account</button>
            </form>

            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.95rem;">
                Already have an account? <a href="{{ url_for('auth.login') }}"
                    style="color: var(--color-blue); font-weight: 500;">Login here</a>.
            </p>
        </div>
    </div>

    <script>
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const toggle = input.nextElementSibling;
            if (input.type === 'password') {
                input.type = 'text';
                toggle.textContent = 'Hide';
            } else {
                input.type = 'password';
                toggle.textContent = 'Show';
            }
        }
    </script>
</body>

</html>
