<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - CreditPredict</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .auth-form-container {
            max-width: 450px;
            margin: 4rem auto;
            background: #fff;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--color-border);
        }

        .auth-form-container h2 {
            text-align: center;
            margin-bottom: 1rem;
            color: var(--color-slate-900);
        }

        .auth-form-container p {
            text-align: center;
            margin-bottom: 2rem;
            color: var(--color-text-muted);
            font-size: 0.95rem;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--color-border);
            border-radius: 8px;
            font-family: inherit;
            margin-top: 0.25rem;
        }
    </style>
</head>

<body>
    <div class="container fade-in-up">
        <nav class="navbar">
            <div class="nav-container">
                <a href="{{ url_for('welcome') }}" class="nav-brand">💳 CreditPredict</a>
            </div>
        </nav>

        <div class="auth-form-container fade-in-up delay-1">
            <h2>Reset Password</h2>
            <p>Enter your registered email address and we'll send you instructions to reset your password.</p>

            <form action="{{ url_for('auth.forgot_password') }}" method="GET">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" required placeholder="Enter your email" class="form-control">
                </div>

                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1.5rem;"
                    onclick="event.preventDefault(); alert('Reset link sent to your email (Placeholder)');">Send Reset
                    Link</button>
            </form>

            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.95rem;">
                Remember your password? <a href="{{ url_for('auth.login') }}"
                    style="color: var(--color-blue); font-weight: 500;">Back to Login</a>.
            </p>
        </div>
    </div>
</body>

</html>
